<!DOCTYPE html>
<html>

<head>
    <title>School event Registration Form</title>
</head>

<body>
    <h1>School event Registration Form</h1>
    <form>
        <fieldset>
            <legend>Personal Information:</legend>

            <label for="fname">First name:</label><br>
            <input type="text" id="fname" name="fname"><br><br>

            <label for="lname">Last name:</label><br>
            <input type="text" id="lname" name="lname"><br><br>

            <label>Gender:</label><br>
            <input type="radio" id="male" name="gender" value="Male">
            <label for="male">Male</label><br>
            <input type="radio" id="female" name="gender" value="Female">
            <label for="female">Female</label><br>
            <input type="radio" id="other" name="gender" value="Other">
            <label for="other">Other</label><br><br>

            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email"><br><br>

            <label for="password">Password:</label><br>
            <input type="password" id="password" name="password"><br><br>

            <label for="birthday">Birthday:</label><br>
            <input type="date" id="birthday" name="birthday"><br><br>

            <label for="address">Address/Description:</label><br>
            <textarea id="address" name="description" rows="5" cols="50">Enter description here...</textarea><br><br>

            <label for="image">Profile Image:</label><br>
            <input type="file" id="image" name="fileupload" accept="image/*"><br><br><br>

            <center>
                <input type="submit" value="Submit">
                <input type="reset" value="Reset">
            </center>
        </fieldset>
    </form>
</body>

</html>
